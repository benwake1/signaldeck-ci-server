name: Deploy to Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Deploy to all instances listed in DEPLOY_PATHS (space-separated).
            # Falls back to the default path for single-instance setups.
            PATHS="${{ secrets.DEPLOY_PATHS || '/var/www/cypress-dashboard' }}"
            VERSION="${{ github.ref_type == 'tag' && github.ref_name || '' }}"

            for APP_DIR in $PATHS; do
              echo ""
              echo "══════════════════════════════════════"
              echo " Deploying: $APP_DIR"
              echo "══════════════════════════════════════"

              if [ ! -d "$APP_DIR" ]; then
                echo "⚠ Directory not found — skipping: $APP_DIR"
                continue
              fi

              # Detect the owner so git/composer/artisan run as the correct user
              APP_USER=$(stat -c '%U' "$APP_DIR")
              git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true

              cd "$APP_DIR"
              sudo -u "$APP_USER" git fetch --tags origin
              sudo -u "$APP_USER" git reset --hard origin/main
              APP_VERSION="$VERSION" sudo -u "$APP_USER" bash deploy.sh

              echo "✔ Done: $APP_DIR"
            done
